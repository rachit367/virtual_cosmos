services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/virtual-cosmos
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "5173:8080"
    depends_on:
      - server
